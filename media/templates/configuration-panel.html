<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xygeni Configuration</title>
    <style>
        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            color: var(--vscode-foreground);
            background-color: var(--vscode-editor-background);
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            color: var(--vscode-foreground);
            border-bottom: 1px solid var(--vscode-panel-border);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--vscode-foreground);
        }
        
        input[type="text"], input[type="password"], input[type="url"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--vscode-input-border);
            background-color: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border-radius: 3px;
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            box-sizing: border-box;
        }
        
        input[type="text"]:focus, input[type="password"]:focus, input[type="url"]:focus {
            outline: none;
            border-color: var(--vscode-focusBorder);
        }
        
        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
        }
        
        .primary-button {
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }
        
        .primary-button:hover {
            background-color: var(--vscode-button-hoverBackground);
        }
        
        .secondary-button {
            background-color: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }
        
        .secondary-button:hover {
            background-color: var(--vscode-button-secondaryHoverBackground);
        }
        
        .description {
            font-size: 0.9em;
            color: var(--vscode-descriptionForeground);
            margin-top: 5px;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 3px;
            display: none;
        }
        
        .status.success {
            background-color: var(--vscode-inputValidation-infoBackground);
            border: 1px solid var(--vscode-inputValidation-infoBorder);
            color: var(--vscode-inputValidation-infoForeground);
        }
        
        .status.error {
            background-color: var(--vscode-inputValidation-errorBackground);
            border: 1px solid var(--vscode-inputValidation-errorBorder);
            color: var(--vscode-inputValidation-errorForeground);
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-item input[type="checkbox"] {
            margin: 0;
            width: auto;
        }
        
        .checkbox-item label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Xygeni Configuration</h1>
        
        <form id="configForm">
            <div class="form-group">
                <label for="xygeniUrl">Xygeni URL</label>
                <input type="url" id="xygeniUrl" name="xygeniUrl" value="{{xygeniUrl}}" placeholder="https://api.xygeni.io">
                <div class="description">The URL of your Xygeni API Server instance</div>
            </div>
            
            <div class="form-group">
                <label for="xygeniToken">Xygeni Token</label>
                <input type="password" id="xygeniToken" name="xygeniToken" value="{{xygeniToken}}" placeholder="Enter your authentication token">
                <div class="description">Your Xygeni API authentication token</div>
            </div>
            
            
            
            <div class="button-group">
                <button type="submit" class="primary-button">Save Configuration</button>
                <button type="button" id="testButton" class="secondary-button">Test Connection</button>
            </div>
        </form>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        
        document.getElementById('configForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const xygeniUrl = document.getElementById('xygeniUrl').value;
            const xygeniToken = document.getElementById('xygeniToken').value;
            
            vscode.postMessage({
                command: 'saveConfig',
                xygeniUrl: xygeniUrl,
                xygeniToken: xygeniToken
            });
        });
        
        document.getElementById('testButton').addEventListener('click', function() {
            const xygeniUrl = document.getElementById('xygeniUrl').value;
            const xygeniToken = document.getElementById('xygeniToken').value;
            
            if (!xygeniUrl || !xygeniToken) {
                showStatus('Please enter both Tool URL and Authentication Token before testing.', 'error');
                return;
            }
            
            vscode.postMessage({
                command: 'testConnection',
                xygeniUrl: xygeniUrl,
                xygeniToken: xygeniToken
            });
        });
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
            
            // Hide status after 5 seconds
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
        
        // Listen for messages from the extension
        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.command) {
                case 'configSaved':
                    showStatus('Configuration saved successfully!', 'success');
                    break;
                case 'connectionSuccess':
                    showStatus('Connection test successful!', 'success');
                    break;
                case 'connectionError':
                    showStatus('Connection test failed: ' + message.error, 'error');
                    break;
            }
        });
    </script>
</body>
</html>
